# ASTF-net training configuration

tb_output_dir: ".sdev/output/"
tb_exp_name: "cnn_exp1"

# Dataset — only data_path is required; file names are resolved automatically
data_path: "EGFs_new_3_with_ASTFs_vr_ratio2_min0/"

batch_size: 4096
num_workers: 16
log_normalize_astf: false
log_normalize_input: true

# Data augmentations
augmentations:
  - AddRandomNoise:
      noise_level: 0.1
  - DropRegion:
      max_drop_length: 10
  - AddTrend:
      min_deg: -1
      max_deg: 1
  - RandomShift:
      max_shift: 10

max_augmentations: 1

# Model hyperparameters
model_name: "simplecnn"
in_channels: 2
output_length: 256
lr: 0.001
max_epochs: 700
device: "gpu"
gpus: [0]

# Callbacks configuration
callbacks:
  early_stopping:
    monitor: "val/loss_epoch"
    mode: "min"
    patience: 20
    min_delta: 0.0
    verbose: true
  lr_scheduler:
    monitor: "val/loss_epoch"
    mode: "min"
    factor: 0.5
    patience: 10
  model_checkpoint:
    monitor: "val/loss_epoch"
    mode: "min"
    save_top_k: 1
    filename: "best-{epoch:02d}-{val_loss_epoch:.4f}"

# Optimization
loss: "mse"
