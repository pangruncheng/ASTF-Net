# ASTF-net training configuration

tb_output_dir: ".sdev/output/"
tb_exp_name: "transformer_dev"

# Dataset — only data_path is required; file names are resolved automatically
data_path: "EGFs_new_3_with_ASTFs_vr_ratio2_min0/"

batch_size: 4096
num_workers: 16
log_normalize_astf: false
log_normalize_input: true

# Data augmentations
augmentations:
  - AddRandomNoise:
      noise_level: 0.1
  - DropRegion:
      max_drop_length: 10
  - AddTrend:
      min_deg: -1
      max_deg: 1
  - RandomShift:
      max_shift: 10

max_augmentations: 1

# Model hyperparameters
model_name: "transformer"
lr: 0.0001
loss: "mse"
max_epochs: 100
device: "gpu"
gpus: [0]

# Data input and output
in_channels: 2
output_length: 256

# Transformer-specific
cnn_kernel_size: 20
cnn_stride: 5
d_model: 256
nhead: 4
num_encoder_layers: 4
dim_feedforward: 256
dropout: 0.2

# Callbacks configuration
callbacks:
  early_stopping:
    monitor: "val/loss_epoch"
    mode: "min"
    patience: 10
    min_delta: 0.0
    verbose: true
  model_checkpoint:
    monitor: "val/loss_epoch"
    mode: "min"
    save_top_k: 1
    filename: "best-{epoch:02d}-{val_loss_epoch:.4f}"
