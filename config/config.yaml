# ASTF-net training configuration

# Dataset and dataloader
data_path: "/group/data/dataset_ASTF-net/Target_waveforms"
train_hdf5_file: "${data_path}/Train_pairs_2_Samezero_256_new_3_1.h5"
val_hdf5_file: "${data_path}/Validation_pairs_2_Samezero_256_new_3_1.h5"
test_hdf5_file: "${data_path}/Test_level1_pairs_2_Samezero_256_new_3_1.h5"
batch_size: 4096
num_workers: 16

# Data augmentations (SpeechBrain style)
data_augmentations:
  - AddRandomNoise:
      noise_level: 0.1
  - DropRegion:
      max_drop_length: 10
  - AddTrend:
      min_deg: -1
      max_deg: 1

# Model hyperparameters
in_channels: 2
output_length: 256
lr: 0.001
max_epochs: 100
device: "gpu"
gpus: [1]

# Callbacks configuration
callbacks:
  early_stopping:
    monitor: "val/loss"
    mode: "min"
    patience: 20
    min_delta: 0.0
    verbose: true
  lr_scheduler:
    monitor: "val/loss"
    mode: "min"
    factor: 0.5
    patience: 10
    # verbose: true
  model_checkpoint:
    monitor: "val/loss"
    mode: "min"
    save_top_k: 1
    filename: "best-{epoch:02d}-{val_loss:.4f}"
    # verbose: true

# Optimization
loss: "nonzero_weighted_mse"
# loss: "convalignLoss"
# loss_weight: 0.5

output_dir: "output/"
